<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spatial Controller</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body>
  <main class="page">
    <h1>Spatial Controller</h1>
    <p><a href="../index.html">Back to project page</a></p>

    <section id="controls">
      <div class="identity-row">
        <label>
          Name
          <input id="name" type="text" placeholder="Player name" />
        </label>

        <label class="player-number-field">
          Player Number
          <input id="playerNumber" type="number" min="1" step="1" placeholder="1" />
        </label>
      </div>

      <label>
        Host URL
        <input id="host" type="text" placeholder="example.trycloudflare.com" />
      </label>

      <div class="connect-row">
        <div class="buttons">
          <button id="connectBtn" type="button">Connect</button>
        </div>

        <p id="status">Disconnected</p>
      </div>
    </section>

    <section class="canvases">
      <div class="canvas-card">
        <h2>Top Down View (XY)</h2>
        <canvas id="xy" width="360" height="360"></canvas>
      </div>

      <div class="canvas-card">
        <h2>Side View (XZ)</h2>
        <canvas id="xz" width="360" height="360"></canvas>
      </div>
    </section>

    <section class="dial-section">
  <div class="dial-card">
    <div class="dial-header">
      <div>
        <h2>Azimuth</h2>
        <label class="toggle-row knob-toggle" for="trackAzimuthToggle">
          <input id="trackAzimuthToggle" type="checkbox" checked />
          <span>Use head tracking</span>
        </label>
      </div>

      <div class="offset-wrap tracking-offset">
        <div class="offset-label">Offset</div>
        <div class="knob knob-small" id="azimuthOffsetKnob" tabindex="0" aria-label="Azimuth offset dial">
          <div class="knob-face">
            <div class="knob-indicator"></div>
          </div>
        </div>
        <div class="knob-value knob-value-small" id="azimuthOffsetValue">0°</div>
      </div>
    </div>

    <div class="knob" id="azimuthKnob" tabindex="0" aria-label="Azimuth dial">
      <div class="knob-face">
        <div class="knob-indicator"></div>
      </div>
    </div>
    <div class="knob-value" id="azimuthValue">0°</div>
  </div>

  <div class="dial-card">
    <div class="dial-header">
      <div>
        <h2>Elevation</h2>
        <label class="toggle-row knob-toggle" for="trackElevationToggle">
          <input id="trackElevationToggle" type="checkbox" checked />
          <span>Use head tracking</span>
        </label>
      </div>

      <div class="offset-wrap tracking-offset">
        <div class="offset-label">Offset</div>
        <div class="knob knob-small" id="elevationOffsetKnob" tabindex="0" aria-label="Elevation offset dial">
          <div class="knob-face">
            <div class="knob-indicator"></div>
          </div>
        </div>
        <div class="knob-value knob-value-small" id="elevationOffsetValue">0°</div>
      </div>
    </div>

    <div class="knob" id="elevationKnob" tabindex="0" aria-label="Elevation dial">
      <div class="knob-face">
        <div class="knob-indicator"></div>
      </div>
    </div>
    <div class="knob-value" id="elevationValue">0°</div>
  </div>

  <div class="dial-card">
    <div class="dial-header">
      <div>
        <h2>Roll</h2>
        <label class="toggle-row knob-toggle" for="trackRollToggle">
          <input id="trackRollToggle" type="checkbox" checked />
          <span>Use head tracking</span>
        </label>
      </div>

      <div class="offset-wrap tracking-offset">
        <div class="offset-label">Offset</div>
        <div class="knob knob-small" id="rollOffsetKnob" tabindex="0" aria-label="Roll offset dial">
          <div class="knob-face">
            <div class="knob-indicator"></div>
          </div>
        </div>
        <div class="knob-value knob-value-small" id="rollOffsetValue">0°</div>
      </div>
    </div>

    <div class="knob" id="rollKnob" tabindex="0" aria-label="Roll dial">
      <div class="knob-face">
        <div class="knob-indicator"></div>
      </div>
    </div>
    <div class="knob-value" id="rollValue">0°</div>
  </div>
</section>

    <section class="camera-section">
  <div class="camera-card">
    <div class="camera-header">
      <h2>Head Tracking Camera</h2>

      <label class="toggle-row" for="headTrackingToggle">
        <input id="headTrackingToggle" type="checkbox" />
        <span>Enable Head Tracking</span>
      </label>
    </div>

    <label class="toggle-row" for="showCameraPreviewToggle">
      <input id="showCameraPreviewToggle" type="checkbox" checked />
      <span>Show Camera Preview</span>
    </label>

    <br>
    <label>
      <select id="cameraSelect">
        <option value="">Choose camera…</option>
      </select>
    </label>

    <video id="cameraVideo" autoplay playsinline muted></video>
    <p id="cameraStatus">Camera inactive</p>
  </div>
</section>
  </main>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script type="module" src="../app.js"></script>
</body>

</html>
